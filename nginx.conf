# This config forces HTTPS ( (SSL + Port 443)and acts as the "bridge" to your containers.

events {
    worker_connections 1024;
}

http{
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;

    {
    upstream vllm_cluster {
        server vllm:8000;            # Local vLLM (Server 1)
        # server [SERVER_2_IP]:8000; # Add Server 2 here later  ( Aby Future Proof )
    }

    # Redirect all HTTP traffic to HTTPS
    # ----
    server {
        listen 80;
	    server_name _;
        return 301 https://$host$request_uri;
    }
    # ----
    
    # HTTPS Server	
    # ----	
    server {
        listen 443 ssl;
	    server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;     
        ssl_certificate_key /etc/nginx/certs/privkey.pem;        

	    # Optimization for LLM streaming
        proxy_buffering off;
        proxy_read_timeout 300s;


        # Main Web Interface (Open WebUI)
        location / {
            proxy_pass http://open-webui:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # LLM API Calls (vLLM)
        location /v1/ {
            proxy_pass http://vllm_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Ensure long-running LLM requests don't timeout
            proxy_connect_timeout 600;
            proxy_send_timeout 600;
            proxy_read_timeout 600;
        }
    }
    # ----
    }
    }
}